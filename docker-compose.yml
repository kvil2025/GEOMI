# ============================================================
# GeologgIA Map — Docker Compose
# ============================================================
# Uso:
#   docker compose up --build
#   Abrir http://localhost:8080
# ============================================================

services:
  geologgia-map:
    build: .
    container_name: geologgia-map
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # Google Auth: lista de emails autorizados (separados por coma)
      - ALLOWED_EMAILS=cavila@geologgia.cl
      # Google OAuth Client ID (obtener en https://console.cloud.google.com/apis/credentials)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    volumes:
      # Persistir datos de geología entre reinicios
      - geodata:/app/geodata
    restart: unless-stopped

volumes:
  geodata:
